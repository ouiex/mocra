[package]
name = "mocra-core"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Core shared types for the mocra crawler framework (errors first; the shared runtime is being extracted here incrementally)."
license = "MIT OR Apache-2.0"
repository = "https://github.com/ouiex/mocra"
homepage = "https://github.com/ouiex/mocra"
documentation = "https://docs.rs/mocra-core"
readme = "README.md"
keywords = ["crawler", "scraping", "framework", "async"]
categories = ["network-programming", "web-programming", "asynchronous"]

[dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
deadpool-redis = { version = "0.22", features = ["json", "script", "serde", "streams"] }
mocra-proxy = { path = "../mocra-proxy" }
mocra-dag = { path = "../mocra-dag" }
polars = { version = "0.52.0", optional = true }
# cacheable(缓存服务:redis / 本地 / 两级后端)
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
log = "0.4"
dashmap = "6"
zstd = "0.13"
flate2 = "1.1.9"
metrics = "0.24"
# utils(限流 / 锁 / 协调 / 日志 / 连接器 / 编码 等)
chrono = { version = "0.4.43", features = ["serde"] }
once_cell = "1"
regex = "1"
md5 = "0.8"
reqwest = { version = "0.13", default-features = false, features = ["http2", "charset", "native-tls", "json", "gzip", "stream"] }
uuid = { version = "1", features = ["serde", "v7", "zerocopy", "v4"] }
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter", "time", "json"] }
tracing-log = "0.2"
# store(sea-orm 连接器 / 事务) — 默认关闭
sea-orm = { version = "1", features = ["postgres-array", "runtime-tokio-native-tls", "sqlx-postgres", "sqlx-sqlite"], optional = true }
# excel(calamine → DataFrame) — 默认关闭,隐含 polars
calamine = { version = "0.33.0", features = ["chrono", "dates"], optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }

[features]
# Data-frame support: adds the `From<PolarsError>` boundary on the core error type + polars_utils.
polars = ["dep:polars"]
# sea-orm connector / transaction helpers.
store = ["dep:sea-orm"]
# Excel parsing (calamine → DataFrame); implies polars.
excel = ["dep:calamine", "polars"]
# In-memory log ring buffer for the observability dashboard.
dashboard = []

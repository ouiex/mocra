[package]
name = "mocra"
version = "0.3.0"
edition = "2024"
description = "A distributed, event-driven crawling and data collection framework"
license = "MIT OR Apache-2.0"
repository = "https://github.com/ouiex/mocra"
homepage = "https://github.com/ouiex/mocra"
documentation = "https://docs.rs/mocra"
readme = "README.md"
rust-version = "1.88"
keywords = ["crawler", "distributed", "queue", "scraping", "framework"]
categories = ["network-programming", "asynchronous", "web-programming"]
autotests = false
exclude = [
	"target/**",
	"data/**",
	"logs/**",
	"raft_data/**",
	"tests/logs/**",
	"docker-compose.kafka.yml",
	"scripts/**",
	".cargo/**",
	".claude/**",
	".github/**",
	".idea/**",
	"Cargo.toml.orig",
	"0",
	"*.log",
]


[dependencies]
hex = "0.4"
async-trait = "0.1"
reqwest = { version = "0.13.3", default-features = false, features = ["http2", "charset", "native-tls", "brotli","form", "cookies", "json", "socks", "gzip", "deflate", "zstd", "hickory-dns", "stream"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
toml = "1.1.2"
uuid = { version = "1.23.1", features = ["serde", "v7","zerocopy", "v4"] }
url = "2"
serde_json = "1"
rmp-serde = "1.3"
tokio = { version = "1.52.3", features = ["full"] }
sea-orm = { version = "1.1.20", features = ["postgres-array", "runtime-tokio-native-tls", "sqlx-postgres", "sqlx-sqlite"] }
rdkafka = { version = "0.39", features = ["cmake-build"] }
futures = "0.3"
log = "0.4"
chrono = { version = "0.4.41", features = ["serde"] }
env_logger = "0.11.10"
tracing = "0.1"
tracing-appender = "0.2.5"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "time", "json"] }
tracing-log = "0.2"
once_cell = "1"
reqwest_cookie_store = { version = "0.10", features = ["serde"] }
v8 = { version = "149", optional = true }
time = { version = "0.3.47", features = ["local-offset", "formatting", "parsing"] }
polars = { version = "0.53.0", features = ["json", "lazy", "serde", "csv", "timezones", "strings", "ipc", "parquet", "dtype-decimal"] }
polars-lazy = { version = "0.53.0", features = ["pivot"] }
polars-ops = { version = "0.53.0", features = ["pivot"] }
chrono-tz = "0.10"
calamine = { version = "0.35.0", features = ["chrono", "dates"] }
semver = { version = "1", features = ["serde"] }
dyn-clone = { version = "1" }
base64 = { version = "0.22" }
ring = { version = "0.17" }
md5 = "0.8"
regex = { version = "1" }
urlencoding = "2"
axum = { version = "0.8.9", features = ["json"] }
dashmap = "6.2.1"
futures-util = "0.3"
rand = "0.10.1"
serde_urlencoded = "0.7"
sha1 = "0.11.0"
tokio-tungstenite = { version = "0.29.0", features = ["native-tls"] }
metrics = "0.24.6"
metrics-exporter-prometheus = "0.18.3"
zstd = "0.13"
mimalloc = { version = "0.1.50", default-features = false, optional = true }
serde_path_to_error = "0.1"
crc32fast = "1.5.0"
flate2 = "1.1.9"
cron = "0.16.0"
sysinfo = "0.38.4"
bloomfilter = "3"
siphasher = "1"
tempfile = "3.27.0"
indexmap = { version = "2.14.0", features = ["serde"] }
rocksdb = "0.24"
openraft = { version = "0.10.0-alpha.20", features = ["serde", "tokio-rt"] }

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true


[features]
default = ["mimalloc"]
js-v8 = ["dep:v8"]
mimalloc = ["dep:mimalloc"]
polars = []

[lib]
name = "mocra"
path = "src/lib.rs"

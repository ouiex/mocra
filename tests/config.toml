name = "app_rpa"

[api]
port = 8905

[db]
url = "postgres://eason:Qaz.123456@localhost:5433/crawler"
database_schema = "base"
pool_size = 50

[download_config]
# Increased pool size for 2000 concurrent requests
pool_size = 800
downloader_expire = 3600
timeout = 30
rate_limit = 1
enable_session = true
enable_locker = false
enable_rate_limit = false
cache_ttl = 60
wss_timeout = 60


[cache]
ttl = 60

[crawler]
request_max_retries = 1
task_max_errors = 100
module_max_errors = 10
module_locker_ttl = 5
task_concurrency = 32
idle_stop_secs = 120

[scheduler]
refresh_interval_secs = 60
max_staleness_secs = 120

[channel_config]
minid_time = 12
capacity = 20000
queue_codec = "msgpack"
compression_threshold = 1048576
batch_concurrency = 500


[[logger.outputs]]
type = "console"

[[logger.outputs]]
type = "file"
path = "logs/app.log"

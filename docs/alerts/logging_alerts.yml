groups:
  - name: logging_alerts
    rules:
      - alert: LogDropRateHigh
        expr: sum(rate(log_dropped_total[5m])) / (sum(rate(log_events_total[5m])) + sum(rate(log_dropped_total[5m]))) > 0.005
        for: 10m
        labels:
          severity: warn
        annotations:
          summary: "Log drop rate high"
          description: "Log drop rate > 0.5% for 10m"
      - alert: LogQueueLagHigh
        expr: max(log_queue_lag) > 5000
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "Log queue lag high"
          description: "log_queue_lag > 5000 for 5m"
      - alert: LogSinkErrorsHigh
        expr: sum(rate(log_sink_errors_total[5m])) > 1
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "Log sink errors"
          description: "log_sink_errors_total rate > 1/s for 5m"

      - alert: RequestPublishBackpressureHigh
        expr: sum(rate(request_publish_backpressure_total{reason="queue_full"}[5m])) > 5
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "Request publish backpressure high"
          description: "request_publish_backpressure_total(queue_full) rate > 5/s for 5m"

      - alert: ParserChainBackpressureHigh
        expr: sum by (queue) (rate(parser_chain_backpressure_total{reason="queue_full"}[5m])) > 5
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "Parser chain backpressure high"
          description: "parser_chain_backpressure_total(queue_full) rate high on queue={{ $labels.queue }}"

      - alert: DownloadResponseBackpressureHigh
        expr: sum by (queue) (rate(download_response_backpressure_total{reason="queue_full"}[5m])) > 5
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "Download response backpressure high"
          description: "download_response_backpressure_total(queue_full) rate high on queue={{ $labels.queue }}"

      - alert: BackpressureQueueClosedDetected
        expr: sum(rate(request_publish_backpressure_total{reason="queue_closed"}[5m])) + sum(rate(parser_chain_backpressure_total{reason="queue_closed"}[5m])) + sum(rate(download_response_backpressure_total{reason="queue_closed"}[5m])) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Queue closed detected in pipeline"
          description: "queue_closed backpressure counters observed continuously for 2m"

  - name: dag_runtime_alerts
    rules:
      - alert: DagCriticalEventDetected
        expr: sum by (source, event) (rate(dag_alert_event_total{severity="critical"}[5m])) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DAG critical event detected"
          description: "dag_alert_event_total critical event observed: source={{ $labels.source }} event={{ $labels.event }}"

      - alert: DagWarningEventSustained
        expr: sum by (source, event) (rate(dag_alert_event_total{severity="warning"}[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "DAG warning events sustained"
          description: "dag_alert_event_total warning rate > 0.5/s for 10m: source={{ $labels.source }} event={{ $labels.event }}"

      - alert: DagExecuteErrorNonRetryableHigh
        expr: sum(rate(dag_execute_error_total{error_class="NonRetryable"}[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "DAG non-retryable execute error high"
          description: "dag_execute_error_total NonRetryable > 0.2/s for 10m"

      - alert: DagExecuteErrorRetryableStorm
        expr: sum(rate(dag_execute_error_total{error_class="Retryable"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DAG retryable error storm"
          description: "dag_execute_error_total Retryable > 1/s for 5m"

      - alert: DagRunStateSnapshotSaveError
        expr: sum(rate(dag_run_state_store_total{result="save_error"}[5m])) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "DAG run-state snapshot save errors"
          description: "dag_run_state_store_total{result=save_error} observed continuously for 3m"

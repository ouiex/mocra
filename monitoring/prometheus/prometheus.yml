global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: mocra-node
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8905"]
        labels:
          app: mocra
          env: local
